#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 2
    gaps_out = 2
    border_size = 0
    resize_on_border = true

    snap {
        enabled = true
    }

    allow_tearing = true
}

decoration {
    rounding = 8
    rounding_power = 2

    active_opacity = 0.95
    inactive_opacity = 0.90

    dim_inactive = true
    dim_strength = 0.08

    blur {
        special = true
    }

    shadow {
        range = 10
        render_power = 3
        color = rgba(00000055)
        offset = 2 2
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 0
}

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

master {
    new_status = master
}

xwayland {
    force_zero_scaling = true
}

cursor {
    hide_on_key_press = true
}

binds {
    hide_special_on_workspace_change = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    allow_session_lock_restore = true
}

#############
### INPUT ###
#############

input {
    kb_layout = pl
    sensitivity = 0.1

    touchpad {
        natural_scroll = true
        scroll_factor = 0.3
    }
}
