##############################
### WINDOWS AND WORKSPACES ###
##############################

# --- Global ---
windowrule = suppress_event maximize, match:class .*
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland true

# --- Idle inhibit: don't lock/suspend during fullscreen ---
windowrule = idle_inhibit fullscreen, match:class ^(mpv)$
windowrule = idle_inhibit fullscreen, match:class ^(vlc)$
windowrule = idle_inhibit fullscreen, match:class ^(celluloid)$
windowrule = idle_inhibit fullscreen, match:class zen
windowrule = idle_inhibit fullscreen, match:class firefox

# --- Per-app opacity (active inactive fullscreen) ---
windowrule = opacity 0.98 0.95 1, match:class kitty
windowrule = opacity 0.95 0.90 1, match:class zen
windowrule = opacity 0.95 0.90 1, match:class code
windowrule = opacity 0.95 0.90 1, match:class Code

# --- Picture-in-Picture ---
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = size 25% 25%, match:title ^(Picture-in-Picture)$
windowrule = move 73% 72%, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:title ^(Picture-in-Picture)$

# --- Float: dialogs, utilities, settings ---
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(nwg-look)$
windowrule = float on, match:class ^(nwg-displays)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(org.gnome.Calculator)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, match:title ^(Open File)(.*)$
windowrule = float on, match:title ^(Save As)(.*)$
windowrule = float on, match:title ^(File Upload)(.*)$
windowrule = float on, match:title ^(Confirm)(.*)$

# --- Layer rules ---
layerrule = blur on, ignore_alpha 0.3, match:namespace hyprwidgets
layerrule = blur on, ignore_alpha 0.3, match:namespace rofi
layerrule = animation slide top, match:namespace hyprnotify
