source = ~/.config/hypr/hyprlock-colors.conf

general {
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.01
    contrast = 0.9
    brightness = 0.8
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    outer_color = $lock_accent
    inner_color = $lock_bg
    font_color = $lock_fg
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $lock_fg
    font_size = 64
    font_family = CaskaydiaCove Nerd Font
    halign = center
    valign = center
    position = 0, 120
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B")"
    color = $lock_fg_muted
    font_size = 18
    font_family = CaskaydiaCove Nerd Font
    halign = center
    valign = center
    position = 0, 60
}
