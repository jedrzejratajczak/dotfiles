[mgr]
show_hidden = false
sort_by = "natural"
sort_dir_first = true
linemode = "size"

[opener]
edit = [
    { run = 'nvim "$@"', block = true, for = "unix" },
]
play = [
    { run = 'mpv "$@"', orphan = true, for = "unix" },
]
open = [
    { run = 'xdg-open "$@"', orphan = true, for = "unix" },
]

[open]
rules = [
    { mime = "text/*", use = "edit" },
    { mime = "video/*", use = "play" },
    { mime = "audio/*", use = "play" },
    { mime = "image/*", use = "open" },
    { mime = "application/pdf", use = "open" },
    { mime = "*", use = "open" },
]
