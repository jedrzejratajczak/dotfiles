# Generated by matugen — do not edit manually

[mgr]
cwd = { fg = "{{colors.primary.default.hex}}" }

find_keyword  = { fg = "{{colors.tertiary.default.hex}}", bold = true, italic = true, underline = true }
find_position = { fg = "{{colors.secondary.default.hex}}", bold = true, italic = true }

marker_copied   = { fg = "{{colors.tertiary.default.hex}}",  bg = "{{colors.tertiary.default.hex}}" }
marker_cut      = { fg = "{{colors.error.default.hex}}",     bg = "{{colors.error.default.hex}}" }
marker_marked   = { fg = "{{colors.primary.default.hex}}",   bg = "{{colors.primary.default.hex}}" }
marker_selected = { fg = "{{colors.secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}" }

count_copied   = { fg = "{{colors.on_tertiary.default.hex}}",          bg = "{{colors.tertiary_container.default.hex}}" }
count_cut      = { fg = "{{colors.on_error.default.hex}}",             bg = "{{colors.error.default.hex}}" }
count_selected = { fg = "{{colors.on_secondary_container.default.hex}}", bg = "{{colors.secondary_container.default.hex}}" }

border_style = { fg = "{{colors.outline_variant.default.hex}}" }

[mode]
normal_main = { fg = "{{colors.on_primary_container.default.hex}}", bg = "{{colors.primary_container.default.hex}}", bold = true }
normal_alt  = { fg = "{{colors.primary.default.hex}}", bg = "{{colors.surface_container_highest.default.hex}}" }

select_main = { fg = "{{colors.on_error.default.hex}}", bg = "{{colors.error.default.hex}}", bold = true }
select_alt  = { fg = "{{colors.error.default.hex}}", bg = "{{colors.surface_container_highest.default.hex}}" }

unset_main = { fg = "{{colors.on_secondary_container.default.hex}}", bg = "{{colors.secondary_container.default.hex}}", bold = true }
unset_alt  = { fg = "{{colors.secondary.default.hex}}", bg = "{{colors.surface_container_highest.default.hex}}" }

[tabs]
active   = { fg = "{{colors.on_primary_container.default.hex}}", bg = "{{colors.primary_container.default.hex}}", bold = true }
inactive = { fg = "{{colors.on_surface_variant.default.hex}}", bg = "{{colors.surface_container.default.hex}}" }

[status]
overall = {}

sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

perm_sep   = { fg = "{{colors.outline.default.hex}}" }
perm_type  = { fg = "{{colors.tertiary.default.hex}}" }
perm_read  = { fg = "{{colors.secondary.default.hex}}" }
perm_write = { fg = "{{colors.primary.default.hex}}" }
perm_exec  = { fg = "{{colors.tertiary.default.hex}}" }

progress_label  = { bold = true }
progress_normal = { fg = "{{colors.primary.default.hex}}", bg = "{{colors.surface_container.default.hex}}" }
progress_error  = { fg = "{{colors.on_error.default.hex}}", bg = "{{colors.error.default.hex}}" }

[input]
border = { fg = "{{colors.primary_container.default.hex}}" }
title  = {}
value  = {}
selected = { reversed = true }

[confirm]
border = { fg = "{{colors.primary_container.default.hex}}" }
title  = { fg = "{{colors.primary.default.hex}}" }
btn_yes = { reversed = true }
btn_no  = {}

[pick]
border   = { fg = "{{colors.primary_container.default.hex}}" }
active   = { fg = "{{colors.primary.default.hex}}", bold = true }
inactive = {}

[notify]
title_info  = { fg = "{{colors.tertiary.default.hex}}" }
title_warn  = { fg = "{{colors.secondary.default.hex}}" }
title_error = { fg = "{{colors.error.default.hex}}" }

[spot]
border   = { fg = "{{colors.primary_container.default.hex}}" }
title    = { fg = "{{colors.primary.default.hex}}" }
tbl_col  = { fg = "{{colors.primary.default.hex}}" }
tbl_cell = { fg = "{{colors.secondary.default.hex}}", reversed = true }

[which]
mask      = { bg = "{{colors.surface_container_lowest.default.hex}}" }
cand      = { fg = "{{colors.primary.default.hex}}" }
rest      = { fg = "{{colors.outline.default.hex}}" }
desc      = { fg = "{{colors.secondary.default.hex}}" }
separator_style = { fg = "{{colors.outline_variant.default.hex}}" }

[tasks]
border  = { fg = "{{colors.primary_container.default.hex}}" }
hovered = { fg = "{{colors.primary.default.hex}}", bold = true }

[help]
on      = { fg = "{{colors.primary.default.hex}}" }
run     = { fg = "{{colors.secondary.default.hex}}" }
hovered = { reversed = true, bold = true }
footer  = { fg = "{{colors.on_primary_container.default.hex}}", bg = "{{colors.primary_container.default.hex}}" }

[filetype]
rules = [
    { mime = "image/*", fg = "{{colors.secondary.default.hex}}" },
    { mime = "{audio,video}/*", fg = "{{colors.tertiary.default.hex}}" },
    { mime = "application/zip", fg = "{{colors.error.default.hex}}" },
    { mime = "application/pdf", fg = "{{colors.primary.default.hex}}" },
    { mime = "vfs/{absent,stale}", fg = "{{colors.outline.default.hex}}" },
    { url = "*", is = "orphan", bg = "{{colors.error.default.hex}}" },
    { url = "*", is = "exec", fg = "{{colors.tertiary.default.hex}}" },
    { url = "*/", fg = "{{colors.primary.default.hex}}" },
]
