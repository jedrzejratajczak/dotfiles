<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Outer segmented ring: center (64,64), radius 48, stroke 7 -->
  <!-- Arrow arc: 315° (1:30) counterclockwise to 232° (~10:45), ~83° -->
  <path d="M 97.9,30.1 A 48,48 0 0 0 34.5,26.2"
        stroke="#00d4ff" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Arrowhead at ~10:45 end, base centered on arc end, tip along tangent -->
  <polygon points="24,35 30,21 39,32" fill="#00d4ff"/>
  <!-- Right arc: 345° to 35°, ~50° -->
  <path d="M 110.4,51.6 A 48,48 0 0 1 103.3,91.5"
        stroke="#00d4ff" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Bottom arc: 65° to 115°, ~50° -->
  <path d="M 84.3,107.5 A 48,48 0 0 1 43.7,107.5"
        stroke="#00d4ff" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Left arc: 145° to 195°, ~50° -->
  <path d="M 24.7,91.5 A 48,48 0 0 1 17.6,51.6"
        stroke="#00d4ff" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Dots at gap centers (30° gaps) -->
  <circle cx="105.6" cy="40" r="3" fill="#00d4ff"/>   <!-- gap at ~2 o'clock (330°) -->
  <circle cx="94.9" cy="100.8" r="3" fill="#00d4ff"/>  <!-- gap at ~5 o'clock (50°) -->
  <circle cx="33.1" cy="100.8" r="3" fill="#00d4ff"/>  <!-- gap at ~8 o'clock (130°) -->
  <circle cx="22.4" cy="40" r="3" fill="#00d4ff"/>     <!-- gap at ~10 o'clock (210°) -->
  <!-- Inner ring: full circle -->
  <circle cx="64" cy="64" r="20" stroke="#00d4ff" stroke-width="7" fill="none"/>
</svg>
