<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Full outer ring -->
  <circle cx="64" cy="64" r="50" stroke="#26a69a" stroke-width="7" fill="none"/>
  <!-- Key bow (circular handle at top) -->
  <circle cx="64" cy="52" r="14" stroke="#26a69a" stroke-width="6" fill="none"/>
  <!-- Key shaft going down -->
  <line x1="64" y1="66" x2="64" y2="96" stroke="#26a69a" stroke-width="6" stroke-linecap="round"/>
  <!-- Key tooth (notch on right side near bottom) -->
  <line x1="64" y1="84" x2="76" y2="84" stroke="#26a69a" stroke-width="6" stroke-linecap="round"/>
  <!-- Small tooth near end -->
  <line x1="64" y1="92" x2="72" y2="92" stroke="#26a69a" stroke-width="5" stroke-linecap="round"/>
</svg>
